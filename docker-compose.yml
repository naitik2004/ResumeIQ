version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    # For hot reloading in development
    volumes:
      - ./backend:/app
    environment:
      - ENV=development

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
